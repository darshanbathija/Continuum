name: Deploy clawdmeter-apns-gateway

# Mirrors deploy-relay.yml. The APNS gateway is the higher-blast-radius
# Worker (holds operator .p8) — production deploy is manual-only via
# workflow_dispatch + required-reviewer approval on the gh "production"
# environment.

on:
  push:
    branches: [main]
    paths:
      - "infra/apns-gateway/**"
      - ".github/workflows/deploy-apns-gateway.yml"
  pull_request:
    paths:
      - "infra/apns-gateway/**"
      - ".github/workflows/deploy-apns-gateway.yml"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Which env to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Pin toolchain at the workflow level so every job uses the same versions.
# Wrangler is ALSO pinned in infra/apns-gateway/package.json — belt-and-
# suspenders. Bump both together.
env:
  BUN_VERSION: "1.1.42"
  WRANGLER_VERSION: "3.95.0"

permissions:
  contents: read

jobs:
  validate:
    name: Validate wrangler.toml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/apns-gateway
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: infra/apns-gateway
        run: bun run typecheck
      - name: Tests
        working-directory: infra/apns-gateway
        run: bun run test
      - name: Dry-run deploy (staging)
        working-directory: infra/apns-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not configured. Skipping dry-run; wrangler.toml syntax check only."
            bunx wrangler@${WRANGLER_VERSION} types --env staging || true
          else
            bunx wrangler@${WRANGLER_VERSION} deploy --dry-run --env staging
          fi

  deploy-staging:
    name: Deploy to staging
    needs: validate
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://apns-gateway-staging.clawdmeter.dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/apns-gateway
        run: bun install --frozen-lockfile
      - name: Deploy to staging
        working-directory: infra/apns-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@${WRANGLER_VERSION} deploy --env staging

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'production'
    environment:
      name: production
      url: https://apns-gateway.clawdmeter.dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/apns-gateway
        # Production deploys REQUIRE a lockfile. Fail loud if it's missing.
        run: bun install --frozen-lockfile
      - name: Deploy to production
        working-directory: infra/apns-gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@${WRANGLER_VERSION} deploy --env production
