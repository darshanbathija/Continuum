name: Deploy clawdmeter-relay

# Flow:
#   PR touching infra/relay/** → typecheck + tests + dry-run deploy
#   Merge to main → deploy to staging + smoke test
#   Manual gh-environment "production" approval → deploy to production
#
# Plan reference: E0 scaffold (Phase 0), E2 source (Phase 2) — see
# .claude/plans/study-this-codebase-crystalline-shore.md

on:
  push:
    branches: [main]
    paths:
      - "infra/relay/**"
      - ".github/workflows/deploy-relay.yml"
  pull_request:
    paths:
      - "infra/relay/**"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Which env to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Pin toolchain at the workflow level so every job uses the same versions.
# Wrangler is ALSO pinned in infra/relay/package.json — these belt-and-
# suspenders. Bump both together.
env:
  BUN_VERSION: "1.1.42"
  WRANGLER_VERSION: "3.114.17"

permissions:
  contents: read

jobs:
  validate:
    name: Validate wrangler.toml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/relay
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: infra/relay
        run: bun run typecheck
      - name: Tests (workerd integration + node crypto vectors)
        working-directory: infra/relay
        run: bun run test
      - name: Dry-run deploy (staging)
        working-directory: infra/relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not configured (PR from fork or pre-secrets-provisioning). Skipping dry-run; wrangler.toml syntax check only."
            bunx wrangler@${WRANGLER_VERSION} types --env staging || true
          else
            bunx wrangler@${WRANGLER_VERSION} deploy --dry-run --env staging
          fi

  deploy-staging:
    name: Deploy to staging
    needs: validate
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://relay-staging.clawdmeter.dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/relay
        run: bun install --frozen-lockfile
      - name: Deploy to staging
        working-directory: infra/relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@${WRANGLER_VERSION} deploy --env staging

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'production'
    environment:
      # Required-reviewer approval gates the production deploy (configure
      # the operator as the required reviewer in GitHub repo settings →
      # Environments → production).
      name: production
      url: https://relay.clawdmeter.dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/relay
        # Production deploys REQUIRE a lockfile. Fail loud if it's missing.
        run: bun install --frozen-lockfile
      - name: Deploy to production
        working-directory: infra/relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@${WRANGLER_VERSION} deploy --env production
