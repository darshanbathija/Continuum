name: Deploy clawdmeter-relay

# E0 scaffold (Phase 0). Source code lands in E2.
#
# Flow:
#   PR touching infra/relay/** → dry-run deploy (validates wrangler.toml)
#   Merge to main → deploy to staging + smoke test
#   Manual gh-environment "production" approval → deploy to production
#
# Plan reference: E0 from .claude/plans/study-this-codebase-crystalline-shore.md

on:
  push:
    branches: [main]
    paths:
      - "infra/relay/**"
      - ".github/workflows/deploy-relay.yml"
  pull_request:
    paths:
      - "infra/relay/**"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:
    inputs:
      target_env:
        description: "Which env to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Pin toolchain at the workflow level so every job uses the same versions.
# Wrangler is ALSO pinned in infra/relay/package.json — these belt-and-
# suspenders. Bump both together.
env:
  BUN_VERSION: "1.1.42"
  WRANGLER_VERSION: "3.95.0"

permissions:
  contents: read

jobs:
  validate:
    name: Validate wrangler.toml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/relay
        # E0 ships without a lockfile (no source yet). E2 must add bun.lockb
        # and this command will then enforce reproducibility automatically.
        # Until then, the pinned wrangler version in package.json prevents
        # supply-chain drift.
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            echo "::warning::No lockfile present (E0 scaffold). Pinned wrangler version in package.json is the only supply-chain guard. E2 MUST commit bun.lockb."
            bun install
          fi
      - name: Dry-run deploy (staging)
        working-directory: infra/relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not configured (PR from fork or pre-secrets-provisioning). Skipping dry-run; wrangler.toml syntax check only."
            bunx wrangler@${WRANGLER_VERSION} types --env staging || true
          else
            bunx wrangler@${WRANGLER_VERSION} deploy --dry-run --env staging
          fi

  deploy-staging:
    name: Deploy to staging
    needs: validate
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://relay-staging.clawdmeter.dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/relay
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            echo "::warning::No lockfile present. E2 MUST commit bun.lockb before this deploy job is allowed in production."
            bun install
          fi
      - name: Deploy to staging
        working-directory: infra/relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@${WRANGLER_VERSION} deploy --env staging
      - name: Smoke test (placeholder — real test lands in E2)
        run: |
          echo "::notice::E0 scaffold: smoke test placeholder. E2 will add a real WebSocket roundtrip test against relay-staging.clawdmeter.dev"

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'production'
    environment:
      # Required-reviewer approval gates the production deploy (configure
      # the operator as the required reviewer in GitHub repo settings →
      # Environments → production).
      name: production
      url: https://relay.clawdmeter.dev
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install deps
        working-directory: infra/relay
        # Production deploys REQUIRE a lockfile. Fail loud if it's missing.
        run: bun install --frozen-lockfile
      - name: Deploy to production
        working-directory: infra/relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler@${WRANGLER_VERSION} deploy --env production
