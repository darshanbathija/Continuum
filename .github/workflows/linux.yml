name: Linux CI

on:
  push:
    branches: [main, "linux-app", "feat/linux-*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Default to read-only token scope. release-upload widens to contents:write.
permissions:
  contents: read

jobs:
  shared-tests:
    name: Shared package on Linux (Swift ${{ matrix.swift }})
    runs-on: ubuntu-${{ matrix.ubuntu }}
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]
        swift: ["5.10", "6.0"]
        exclude:
          # 22.04 doesn't ship Swift 6.0 binary toolchain officially.
          - ubuntu: "22.04"
            swift: "6.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift ${{ matrix.swift }}
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
        with:
          swift-version: ${{ matrix.swift }}

      - name: Install system deps (Linux-clean shared baseline)
        run: |
          sudo apt-get update
          # Minimal deps for the shared-package Linux build. UI/Tray deps
          # land in the linux-pkg job below.
          sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Build ClawdmeterShared (Linux)
        working-directory: apple/ClawdmeterShared
        run: swift build

      - name: Test ClawdmeterShared (Linux)
        working-directory: apple/ClawdmeterShared
        run: swift test

  linux-pkg:
    name: linux/ package (Swift 6.0 / Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.0
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
        with:
          swift-version: "6.0"

      - name: Install full GTK4 + WebKitGTK 6.0 deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libayatana-appindicator3-dev libsecret-1-dev \
            libcairo2-dev libpango1.0-dev \
            libwebkitgtk-6.0-dev libvte-2.91-gtk4-dev \
            libdbus-1-dev libsoup-3.0-dev

      - name: Validate C shim deps
        working-directory: linux
        run: ./scripts/configure-c-shims.sh

      - name: Build linux/
        working-directory: linux
        run: swift build

      - name: Test linux/ (security + storage + UI primitives + visual)
        working-directory: linux
        run: swift test

  appimage-build:
    name: AppImage build (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    needs: linux-pkg
    # Linux packaging is quarantined until the daemon/tray binaries stop being
    # stubs and the packaging scripts produce real artifacts.
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.0
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
        with:
          swift-version: "6.0"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libgtk-4-dev libadwaita-1-dev \
            libayatana-appindicator3-dev libsecret-1-dev \
            libcairo2-dev libpango1.0-dev \
            libwebkitgtk-6.0-dev libvte-2.91-gtk4-dev \
            libdbus-1-dev libsoup-3.0-dev \
            bubblewrap xdg-dbus-proxy \
            wget file
      - name: Install linuxdeploy + appimagetool
        run: |
          mkdir -p $HOME/.local/bin
          wget -q -O $HOME/.local/bin/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O $HOME/.local/bin/appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x $HOME/.local/bin/linuxdeploy $HOME/.local/bin/appimagetool
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build AppImage
        run: ./tools/build-linux-appimage.sh
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clawdmeter-AppImage-x86_64
          path: dist/Clawdmeter-*-x86_64.AppImage

  deb-build:
    name: .deb build (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    needs: linux-pkg
    # Linux packaging is quarantined until the daemon/tray binaries stop being
    # stubs and the packaging scripts produce real artifacts.
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.0
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
        with:
          swift-version: "6.0"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libgtk-4-dev libadwaita-1-dev \
            libayatana-appindicator3-dev libsecret-1-dev \
            libcairo2-dev libpango1.0-dev \
            libwebkitgtk-6.0-dev libvte-2.91-gtk4-dev \
            libdbus-1-dev libsoup-3.0-dev \
            dpkg-dev fakeroot
      - name: Build .deb
        run: ./tools/build-linux-deb.sh
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdmeter-deb
          path: dist/clawdmeter_*_amd64.deb

  appimage-install-test:
    name: AppImage install smoke test (D11)
    runs-on: ubuntu-24.04
    needs: appimage-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Clawdmeter-AppImage-x86_64
          path: dist/
      - name: Install AppImage runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file
      - name: Smoke-test the AppImage on a clean Ubuntu 24.04
        run: |
          chmod +x dist/Clawdmeter-*-x86_64.AppImage
          OUTPUT=$(dist/Clawdmeter-*-x86_64.AppImage --version 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "clawdmeter" || { echo "AppImage --version output missing 'clawdmeter'"; exit 1; }

  deb-install-test:
    name: .deb install smoke test (D11)
    runs-on: ubuntu-24.04
    needs: deb-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: clawdmeter-deb
          path: dist/
      - name: Install + run --version
        run: |
          sudo apt-get update
          sudo dpkg -i dist/clawdmeter_*_amd64.deb || sudo apt-get install -fy
          /usr/bin/clawdmeterd --version
          /usr/bin/clawdmeter --version

  release-upload:
    name: Upload artifacts to GitHub Release
    runs-on: ubuntu-24.04
    needs: [appimage-install-test, deb-install-test]
    if: false
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Clawdmeter-AppImage-x86_64/*.AppImage
            artifacts/clawdmeter-deb/*.deb
          fail_on_unmatched_files: true
