<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Comment Selector Fixture</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #f7f7f4;
      color: #151515;
    }

    main {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(220px, 320px);
      gap: 20px;
      max-width: 900px;
    }

    section,
    aside {
      border: 1px solid #c9c9c0;
      border-radius: 8px;
      padding: 16px;
      background: #ffffff;
    }

    button,
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid #9a9a90;
      background: #f1f1ec;
      color: #161616;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }

    .primary-action {
      background: #1769aa;
      color: #ffffff;
      border-color: #1769aa;
      font-weight: 650;
    }

    .toolbar,
    .area-targets,
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .copy {
      max-width: 520px;
      line-height: 1.5;
    }

    #shadow-host {
      display: block;
      margin-top: 16px;
      min-height: 44px;
    }
  </style>
</head>
<body>
  <main data-source="src/App.tsx:1">
    <section data-testid="toolbar-card" data-source="src/components/ToolbarCard.tsx:5">
      <h1>Draft workflow</h1>
      <div class="toolbar">
        <button
          id="primary-save"
          class="primary-action hot"
          aria-label="Save primary draft"
          data-source="src/components/Toolbar.tsx:18"
        >Save Draft</button>
        <button id="secondary-cancel" aria-label="Cancel draft">Cancel</button>
      </div>
      <p id="selectable-copy" class="copy">
        Select this sentence for the browser comment fixture and verify it becomes selected text.
      </p>
      <div id="area-targets" class="area-targets" data-testid="area-targets">
        <button id="area-primary" data-source="src/components/AreaTools.tsx:12">Area Primary</button>
        <a id="area-link" href="#target" data-source="src/components/AreaTools.tsx:19">Area Link</a>
      </div>
    </section>

    <aside data-testid="settings-panel" data-source="src/components/SettingsPanel.tsx:4">
      <h2>Settings</h2>
      <button
        class="apply action"
        data-action="apply"
        data-source="src/components/SettingsPanel.tsx:33"
      >Apply Settings</button>
      <div class="row-actions" id="multi-actions">
        <button id="multi-one" class="row-action">First row action</button>
        <button id="multi-two" class="row-action">Second row action</button>
      </div>
      <div id="shadow-host" data-source="src/components/ShadowHost.tsx:7"></div>
    </aside>
  </main>

  <script>
    const host = document.getElementById("shadow-host");
    const root = host.attachShadow({ mode: "open" });
    root.innerHTML = `
      <style>
        button {
          min-height: 34px;
          padding: 7px 12px;
          border-radius: 6px;
          border: 1px solid #76552d;
          background: #f4dfbd;
          color: #20170d;
        }
      </style>
      <button id="shadow-save" data-source="src/components/ShadowSave.tsx:9">Shadow Save</button>
    `;
  </script>
</body>
</html>
