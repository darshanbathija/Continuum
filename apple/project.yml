# xcodegen project spec — Clawdmeter for Apple
#
# Currently generates the Mac menu bar app only. iOS/watch/widget targets will
# be added back here once their source directories exist (see plan).
#
# Install xcodegen:  brew install xcodegen
# Regenerate:        cd apple && xcodegen
# Open in Xcode:     open apple/Clawdmeter.xcodeproj

name: Clawdmeter
options:
  bundleIdPrefix: ai.continuum
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.31.8"
    CURRENT_PROJECT_VERSION: "208"

packages:
  ClawdmeterShared:
    path: ClawdmeterShared
  # SwiftTerm — Miguel de Icaza's pure-Swift xterm-compatible terminal
  # emulator. Used in both the Mac and iOS Sessions tabs to render the
  # direct PTY bytes streamed over WebSocket.
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.2"

targets:
  # ───────────────────────────────────────────────────────────────
  # Mac menu bar app + dashboard window.
  # Plan D2: one-composition popover (gauge + sparkline + status, no cards).
  # ───────────────────────────────────────────────────────────────
  ClawdmeterMac:
    type: application
    platform: macOS
    sources:
      - path: ClawdmeterMac
        excludes:
          - "Info.plist"
          - "ClawdmeterMac.entitlements"
          - "ClawdmeterMac-Release.entitlements"
          # v0.7.1: bundled Node binary is added via the Copy Files
          # build phase below; exclude from default source scanning so
          # xcodegen doesn't try to compile it as a "source file".
          - "Resources/Vendor/node/**"
          # v0.7.15: same exclusion for the bundled uv binary used by
          # the Antigravity SDK toggle's Python venv provisioning.
          - "Resources/Vendor/uv/**"
          # v0.30.0: bundled OpenCode is app infrastructure for the
          # OpenCode provider. Keep it out of source scanning; the
          # Vendor folder reference copies it into Contents/Resources.
          - "Resources/Vendor/opencode/**"
      # v0.27.0: Resources/Vendor/open-design/** exclusion removed —
      # the bundled Open Design daemon was stripped along with the
      # Design tab.

      # v0.7.1: bundled Node binary is treated as a "Copy Bundle
      # Resources" entry — Xcode copies the whole Vendor/node/ tree
      # into the .app's Contents/Resources/Vendor/node/. The folder
      # reference (buildPhase: resources) preserves the bin/ subdir
      # so CodexSDKManager.locateNode() can resolve it via
      # `Bundle.main.url(forResource:"node", subdirectory:"Vendor/node/bin")`.
      # File doesn't exist on disk for fresh clones; tools/download-bundled-node.sh
      # creates it (gitignored).
      - path: ClawdmeterMac/Resources/Vendor
        type: folder
        buildPhase: resources
        optional: true
      # v0.7.14: bundle the Antigravity Python sidecar so
      # AntigravitySidecarManager.locateSidecarMain() can resolve it
      # from /Applications/Clawdmeter.app/Contents/Resources/clawdmeter-agents/.
      # The whole folder is copied as a folder reference (mirrors
      # Vendor/node pattern above) so future siblings (observer.py,
      # cost_pulse_watcher.py, etc.) come along for free when v0.6.1's
      # full uv provisioning lands.
      - path: ../tools/clawdmeter-agents
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - package: ClawdmeterShared
        product: ClawdmeterShared
      - package: SwiftTerm
        product: SwiftTerm
      - package: Sparkle
        product: Sparkle
      - target: ClawdmeterMacWidgets
        embed: true
    preBuildScripts:
      - name: Download bundled Node (if missing)
        # v0.7.1: ensure the bundled Node binary exists before the
        # resources phase runs. The script is idempotent + fast on
        # warm cache (~50ms when already present, ~30s on first run).
        # Skip when CLAWDMETER_SKIP_BUNDLED_NODE=1 (dev iteration where
        # the dev relies on system Node via CodexSDKManager fallback).
        script: |
          if [ "${CLAWDMETER_SKIP_BUNDLED_NODE:-0}" = "1" ]; then
            echo "Skipping bundled Node download (CLAWDMETER_SKIP_BUNDLED_NODE=1)"
            exit 0
          fi
          REPO_ROOT="$(cd "$SRCROOT/.." && pwd)"
          if [ ! -x "$REPO_ROOT/apple/ClawdmeterMac/Resources/Vendor/node/bin/node" ]; then
            "$REPO_ROOT/tools/download-bundled-node.sh"
          fi
        outputFiles:
          - $(SRCROOT)/ClawdmeterMac/Resources/Vendor/node/bin/node
      - name: Download bundled uv (if missing)
        # v0.7.15: ensure the bundled uv binary exists before the
        # resources phase runs. Same pattern as the Node script —
        # idempotent + ~10ms warm path + ~25s cold. Skip via
        # CLAWDMETER_SKIP_BUNDLED_UV=1 for dev iteration; falls back
        # to the Disk-mode Antigravity SDK in that case (toggle just
        # won't be able to provision).
        script: |
          if [ "${CLAWDMETER_SKIP_BUNDLED_UV:-0}" = "1" ]; then
            echo "Skipping bundled uv download (CLAWDMETER_SKIP_BUNDLED_UV=1)"
            exit 0
          fi
          REPO_ROOT="$(cd "$SRCROOT/.." && pwd)"
          if [ ! -x "$REPO_ROOT/apple/ClawdmeterMac/Resources/Vendor/uv/uv" ]; then
            "$REPO_ROOT/tools/download-bundled-uv.sh"
          fi
        outputFiles:
          - $(SRCROOT)/ClawdmeterMac/Resources/Vendor/uv/uv
      - name: Download bundled OpenCode (if missing)
        # v0.30.0: ensure the bundled opencode binary exists before the
        # resources phase runs. The DMG release script also verifies this
        # after archive export so OpenCode cannot be advertised without a
        # bundled runtime in the artifact.
        script: |
          if [ "${CLAWDMETER_SKIP_BUNDLED_OPENCODE:-0}" = "1" ]; then
            echo "Skipping bundled OpenCode download (CLAWDMETER_SKIP_BUNDLED_OPENCODE=1)"
            exit 0
          fi
          REPO_ROOT="$(cd "$SRCROOT/.." && pwd)"
          if [ ! -x "$REPO_ROOT/apple/ClawdmeterMac/Resources/Vendor/opencode/opencode" ]; then
            "$REPO_ROOT/tools/download-bundled-opencode.sh"
          fi
        outputFiles:
          - $(SRCROOT)/ClawdmeterMac/Resources/Vendor/opencode/opencode
      # v0.27.0: "Build bundled Open Design" preBuildScript removed —
      # the bundled Open Design daemon was stripped along with the
      # Design tab.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.mac
        # Bundle-id transition DONE (2026-06): now signed under the
        # Montauk Analytics Inc org team (LRL8MRH6B4) with the
        # ai.continuum.* identity for TestFlight + a Developer-ID DMG.
        # The App Group + keychain + iCloud all moved to ai.continuum
        # (group.LRL8MRH6B4.ai.continuum), so a machine upgrading from
        # the old com.clawdmeter build gets a fresh App Group/keychain
        # /prefs domain — re-pair the iPhone + re-paste the token once.
        # The on-disk data dir ~/Library/Application Support/Clawdmeter/
        # is NOT bundle-scoped, so session/analytics data survives.
        # PRODUCT_NAME → Continuum so the .app users see in /Applications
        # + Finder + Spotlight is "Continuum.app".
        PRODUCT_NAME: Continuum
        # Keep the Swift module + on-disk paths under the "Clawdmeter"
        # identity so `@testable import Clawdmeter` in every test file
        # in `apple/ClawdmeterMacTests/` keeps resolving after the
        # display-name flip. Without this, PRODUCT_MODULE_NAME defaults
        # to PRODUCT_NAME → Continuum, which broke the entire Mac
        # test suite at v0.29.8 (no test PR has gone green since).
        PRODUCT_MODULE_NAME: Clawdmeter
        SPARKLE_PUBLIC_ED_KEY: "dA6tbvVkaBnCj16gub64AzmBY+peo39LeTOowaFHRIY="
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        INFOPLIST_FILE: ClawdmeterMac/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: NO
      # Audit P0 fix: ship sandboxed Release builds. Debug keeps the
      # unsandboxed entitlements so devs can still read Claude Code's
      # Keychain entry locally.
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: ClawdmeterMac/ClawdmeterMac.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: ClawdmeterMac/ClawdmeterMac-Release.entitlements

  # ───────────────────────────────────────────────────────────────
  # iPhone companion app — Plan D6: iOS app with Lock Screen widgets,
  # StandBy widget, Live Activity. V1 of this target: polling + token
  # paste UI; widgets come next.
  # ───────────────────────────────────────────────────────────────
  ClawdmeteriOS:
    type: application
    platform: iOS
    sources:
      - path: ClawdmeteriOS
        excludes:
          - "Info.plist"
          - "ClawdmeteriOS.entitlements"
    dependencies:
      - package: ClawdmeterShared
        product: ClawdmeterShared
      - package: SwiftTerm
        product: SwiftTerm
      - target: ClawdmeteriOSWidgets
        embed: true
      # Companion watch app rides inside the iOS app's Watch/ folder so it
      # ships + installs with the iPhone app (no separate App Store record).
      - target: ClawdmeterWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.ios
        PRODUCT_NAME: Clawdmeter
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        INFOPLIST_FILE: ClawdmeteriOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClawdmeteriOS/ClawdmeteriOS.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES

  # ───────────────────────────────────────────────────────────────
  # iPhone widget extension — Lock Screen, StandBy, and Home Screen
  # widgets. Reads UsageStore directly (iOS App Groups Just Work,
  # unlike on macOS where we needed XPC).
  # ───────────────────────────────────────────────────────────────
  ClawdmeteriOSWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: ClawdmeteriOSWidgets
        excludes:
          - "Info.plist"
          - "ClawdmeteriOSWidgets.entitlements"
    dependencies:
      - package: ClawdmeterShared
        product: ClawdmeterShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.ios.widgets
        PRODUCT_NAME: ClawdmeteriOSWidgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        INFOPLIST_FILE: ClawdmeteriOSWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClawdmeteriOSWidgets/ClawdmeteriOSWidgets.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  # ───────────────────────────────────────────────────────────────
  # watchOS app — Plan D6: wrist-side gauge. iCloud-Keychain-synced
  # token from the Mac/iPhone means zero setup on the Watch.
  # (Pin Desk Mode + complications come in subsequent passes.)
  # ───────────────────────────────────────────────────────────────
  ClawdmeterWatch:
    type: application
    platform: watchOS
    sources:
      - path: ClawdmeterWatch
        excludes:
          - "Info.plist"
          - "ClawdmeterWatch.entitlements"
    dependencies:
      - package: ClawdmeterShared
        product: ClawdmeterShared
      - target: ClawdmeterWatchWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.ios.watchkitapp
        PRODUCT_NAME: Clawdmeter
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        INFOPLIST_FILE: ClawdmeterWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClawdmeterWatch/ClawdmeterWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO

  # ───────────────────────────────────────────────────────────────
  # watchOS complications — Lock-Screen-style accessory widgets for
  # the watch face. Four families: circular, corner, rectangular,
  # inline. Same App-Group-`UserDefaults` read path as the iOS widgets.
  # ───────────────────────────────────────────────────────────────
  ClawdmeterWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: ClawdmeterWatchWidgets
        excludes:
          - "Info.plist"
          - "ClawdmeterWatchWidgets.entitlements"
    dependencies:
      - package: ClawdmeterShared
        product: ClawdmeterShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.ios.watchkitapp.widgets
        PRODUCT_NAME: ClawdmeterWatchWidgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        INFOPLIST_FILE: ClawdmeterWatchWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClawdmeterWatchWidgets/ClawdmeterWatchWidgets.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  # ───────────────────────────────────────────────────────────────
  # Mac widget extension — surfaces Claude/Codex gauges on the Desktop,
  # Notification Center, and Stage Manager. Reads the App Group cache
  # that `ClawdmeterMac` writes on every poll (see UsageStore).
  # ───────────────────────────────────────────────────────────────
  ClawdmeterMacWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: ClawdmeterMacWidgets
        excludes:
          - "Info.plist"
          - "ClawdmeterMacWidgets.entitlements"
    dependencies:
      - package: ClawdmeterShared
        product: ClawdmeterShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.mac.widgets
        PRODUCT_NAME: ClawdmeterMacWidgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        INFOPLIST_FILE: ClawdmeterMacWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClawdmeterMacWidgets/ClawdmeterMacWidgets.entitlements
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES

  # ───────────────────────────────────────────────────────────────
  # Mac XCTest target — v0.7.7. Exercises the Mac-only helpers that
  # can't be reached from ClawdmeterShared's SwiftPM test target:
  # PathValidator delegation, TailscaleWhois.ipOnly, and
  # SidecarAskCoordinator first-wins semantics.
  #
  # Hosted by the ClawdmeterMac application target; `@testable import
  # ClawdmeterMac` works because xcodegen emits the test-host
  # configuration automatically when `testTargets:` references the app
  # target in the scheme below.
  # ───────────────────────────────────────────────────────────────
  ClawdmeterMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClawdmeterMacTests
    dependencies:
      - target: ClawdmeterMac
      - package: ClawdmeterShared
        product: ClawdmeterShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.mac.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
        BUNDLE_LOADER: "$(TEST_HOST)"
        # v0.29.8 renamed the .app to Continuum.app (PRODUCT_NAME flip)
        # but the TEST_HOST string was left pointing at the old path.
        # Repaired so `xcodebuild test -scheme 'Clawdmeter (Mac)'` can
        # actually load the host binary and run unit tests.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Continuum.app/Contents/MacOS/Continuum"

  # ───────────────────────────────────────────────────────────────
  # iOS XCTest target — E4. Exercises the iOS-only helpers that can't
  # be reached from ClawdmeterShared's SwiftPM test target:
  # IOSRelayClient lifecycle + handshake flow.
  #
  # Hosted by the ClawdmeteriOS application target so `@testable import
  # Clawdmeter` (iOS module name) works.
  # ───────────────────────────────────────────────────────────────
  ClawdmeteriOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClawdmeteriOSTests
    dependencies:
      - target: ClawdmeteriOS
      - package: ClawdmeterShared
        product: ClawdmeterShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.ios.tests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: ""
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Clawdmeter.app/Clawdmeter"

  # ───────────────────────────────────────────────────────────────
  # Mac UI XCTest target — Code workspace hover/shortcut smoke tests.
  # Hosted by the ClawdmeterMac application target.
  # ───────────────────────────────────────────────────────────────
  ClawdmeterMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ClawdmeterMacUITests
    dependencies:
      - target: ClawdmeterMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.continuum.mac.uitests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "LRL8MRH6B4"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ClawdmeterMac

schemes:
  Clawdmeter (Mac):
    build:
      targets:
        ClawdmeterMac: all
        ClawdmeterMacWidgets: all
        ClawdmeterMacTests: [test]
        # ClawdmeterMacUITests is intentionally NOT in the default scheme.
        # XCUITest needs a properly *signed* runner; under our unsigned local/CI
        # build (CODE_SIGNING_ALLOWED=NO) macOS Gatekeeper rejects the
        # `ClawdmeterMacUITests-Runner.app` as "damaged and can't be opened".
        # The unit suite (ClawdmeterMacTests) is the real coverage; re-add the
        # UI target here for an explicit, code-signed CI run.
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClawdmeterMacTests
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

  Clawdmeter (Mac UI Tests):
    build:
      targets:
        ClawdmeterMac: all
        ClawdmeterMacUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClawdmeterMacUITests
    analyze:
      config: Debug

  Clawdmeter (iOS):
    build:
      targets:
        ClawdmeteriOS: all
        ClawdmeteriOSWidgets: all
        ClawdmeteriOSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClawdmeteriOSTests

  Clawdmeter (Watch):
    build:
      targets:
        ClawdmeterWatch: all
        ClawdmeterWatchWidgets: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
