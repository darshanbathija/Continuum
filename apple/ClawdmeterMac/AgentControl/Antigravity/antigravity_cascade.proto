// CURATED MINIMAL SUBSET — NOT the full Antigravity schema.
//
// What + why: Antigravity 2's `language_server` Go binary embeds 271 compiled
// .proto files for `exa.language_server_pb.LanguageServerService`. We do NOT
// vendor all of them. This file is a hand-written, deliberately-narrow subset
// covering ONLY the drive surface the Cascade harness exercises:
//   StartCascade (begin a turn) / StreamCascadeReactiveUpdates (server-stream
//   step deltas) / CancelCascadeSteps (cancel) / HandleCascadeUserInteraction
//   (answer a permission/approval).
//
// Field provenance: `tools/extract-antigravity-proto.sh` →
// `docs/acp-harness/antigravity-proto/v1internal-fields.txt`. The 8,600
// `protobuf:"…"` Go struct tags carved out of the binary ARE the schema; the
// field names + numbers below are transcribed from that file where a tag exists
// for the field. Where a tag is absent (request/response WRAPPER messages and
// terminal-status fields the carve didn't surface), the number is PROVISIONAL
// and explicitly commented `// PROVISIONAL` — those are guesses chosen for
// internal consistency.
//
// GOAL: a proto that COMPILES under protoc (libprotoc 35) and generates usable
// grpc-swift v2 + SwiftProtobuf Swift — NOT byte-exact wire compatibility. The
// request/response envelope shapes are a live-verify follow-up (the binary has
// no server reflection, so we cannot `grpcurl describe` to confirm them).
// Decoding tolerance: proto3 silently ignores unknown fields, so even where a
// number is provisional, a real server response still decodes the fields whose
// numbers we DID transcribe correctly; the rest land in unknown-fields.

syntax = "proto3";

package exa.language_server_pb;

// ---------------------------------------------------------------------------
// Trajectory steps — the Cascade "step" is the unit a turn streams as deltas.
// A trajectory is an ordered list of steps; the reactive stream pushes new /
// updated steps as the agent works. `step_payload` is a oneof discriminating
// the step kind (assistant text, tool call, diff, permission, completion).
// ---------------------------------------------------------------------------

// A single proposed/applied file edit. Carved tags:
//   file_diffs       (rep, 1)  — CascadeStep.file_diffs
//   unified_diff     (1 or 3)  — the new-content patch (diff pane derives old)
//   diff_outline     (1)       — short outline of the change
// The diff-pane side derives old text; we only need path + the unified patch.
message CascadeFileDiff {
  // PROVISIONAL: the carve shows `file_diff` (bytes,4) and `file_diffs` (rep,1)
  // but not a dedicated path field number on the inner message. Path is the
  // first human-meaningful field of a file diff in every layout we inspected.
  string file_path = 1;       // PROVISIONAL
  string unified_diff = 3;    // v1internal-fields.txt: unified_diff json=unifiedDiff (field 3)
  string diff_outline = 2;    // PROVISIONAL (diff_outline carved at field 1 on a different msg)
}

// A tool invocation the agent is making. Carved tags:
//   tool_call       (bytes, 1/2/3/4)  — the tool-call submessage
//   tool_call_id    (bytes, 7)        — CascadeStep.tool_call_id json=toolCallId
//   tool_call_json  (bytes, 2)        — serialized tool-call args json=toolCallJson
message CascadeToolCall {
  string tool_call_id = 1;    // PROVISIONAL inner number (carved at 7 on CascadeStep)
  string tool_name = 2;       // PROVISIONAL — name extracted from inner toolcall submessage (idx 2) per AntigravityChatIngestor
  string tool_call_json = 3;  // serialized args
  // Coarse lifecycle. PROVISIONAL enum — the binary uses exa.cortex_pb.CascadeRunStatus
  // (status varint 2/3/5/6) but we only need a 3-state projection for HarnessToolCall.Status.
  CascadeToolCallStatus status = 4;  // PROVISIONAL
}

enum CascadeToolCallStatus {
  CASCADE_TOOL_CALL_STATUS_UNSPECIFIED = 0;
  CASCADE_TOOL_CALL_STATUS_PENDING = 1;
  CASCADE_TOOL_CALL_STATUS_IN_PROGRESS = 2;
  CASCADE_TOOL_CALL_STATUS_COMPLETED = 3;
  CASCADE_TOOL_CALL_STATUS_FAILED = 4;
}

// The agent requesting approval before running proposed steps. Carved tags:
//   is_permission        (varint, 3)  — CascadeStep.is_permission json=isPermission
//   approval_type        (varint, 3/4, enum exa.seat_management_pb.UserTeamDetailsType)
//   proposal_tool_calls  (rep, 1)     — proposed tool calls awaiting approval
//   preapprovals         (rep, 1/2)   — pre-granted approvals
message CascadePermission {
  bool is_permission = 3;                  // v1internal-fields.txt: is_permission (varint 3)
  int32 approval_type = 4;                 // v1internal-fields.txt: approval_type (varint 3/4 enum) — modeled as int32 to avoid vendoring the enum
  string permission_id = 1;                // PROVISIONAL — the id we answer the approval RPC with (carve shows a `PermissionId` field; number not recovered)
  repeated string proposal_tool_calls = 2; // v1internal-fields.txt: proposal_tool_calls (rep 1) — flattened to ids/titles
}

// One trajectory step. `step_payload` oneof selects the kind. Carved tags that
// motivate the cases:
//   tool_call (1/2/3/4) · unified_diff (1/3) · file_diffs (rep,1) ·
//   is_permission (3) · approval_type (3/4)
// Assistant text + reasoning are surfaced as their own fields (the carve shows
// text deltas flow through the step payload; we model them explicitly so the
// mapper can split chat rows from thoughts).
message CascadeStep {
  // Stable identity + ordering. The binary warns about "unstable steps in
  // conversation; last stable index" — `step_index` + `is_stable` let the
  // driver hold a stable-index cursor so we don't render-then-retract.
  int64 step_index = 1;        // PROVISIONAL
  bool is_stable = 2;          // PROVISIONAL — false while the step is still provisional

  oneof step_payload {
    string assistant_text = 10;       // PROVISIONAL — assistant message delta
    string thinking = 11;             // PROVISIONAL — model reasoning delta
    CascadeToolCall tool_call = 12;   // PROVISIONAL inner number; tool_call carved at 1/2/3/4 on CascadeStep
    CascadeFileDiff file_diff = 13;   // PROVISIONAL — derived from file_diffs (rep,1)
    CascadePermission permission = 14; // PROVISIONAL — gated by is_permission (3)
    CascadeStepError error = 15;      // PROVISIONAL — provider error surfaced mid-turn
    CascadeStepCompletion completion = 16; // PROVISIONAL — terminal status
  }
}

message CascadeStepError {
  string message = 1;  // PROVISIONAL
}

// Terminal status of the turn. PROVISIONAL — the carve exposes
// exa.cortex_pb.CascadeRunStatus (status varint) as the run-status discriminator;
// we map to a 3-state outcome the mapper folds into ACPStopReason.
message CascadeStepCompletion {
  CascadeTurnOutcome outcome = 1;  // PROVISIONAL
}

enum CascadeTurnOutcome {
  CASCADE_TURN_OUTCOME_UNSPECIFIED = 0;
  CASCADE_TURN_OUTCOME_COMPLETED = 1;
  CASCADE_TURN_OUTCOME_CANCELLED = 2;
  CASCADE_TURN_OUTCOME_FAILED = 3;
}

// ---------------------------------------------------------------------------
// RPC request / response envelopes. These WRAPPER messages are PROVISIONAL —
// the field map carves the inner payload fields (cascade_id, trajectory_steps,
// etc.) but not the request/response top-level shapes. Numbers chosen for
// consistency; proto3 unknown-field tolerance means a real server response
// still surfaces the carved inner fields.
// ---------------------------------------------------------------------------

// StartCascade — begin a turn. Carved tags that belong on/under the request:
//   cascade_id   (bytes, 1/2/3/…)  — the conversation/cascade id
//   trajectory_steps (rep, 1)      — appears on the trajectory, not the request
message StartCascadeRequest {
  // The conversation/cascade id. v1internal-fields.txt: cascade_id json=cascadeId.
  // Empty on the first turn (server mints one and returns it); set on follow-ups.
  string cascade_id = 1;       // v1internal-fields.txt: cascade_id (field 1)
  string prompt = 2;           // PROVISIONAL — the user turn text
  string workspace_path = 3;   // PROVISIONAL — cwd / repo root the turn runs in
  string project_id = 4;       // PROVISIONAL — Antigravity project uuid (same value agentapi uses)
  string model = 5;            // PROVISIONAL — model tier / id hint
  bool web_search_enabled = 6; // v1internal-fields.txt: cascade_web_search_enabled (varint) — modeled as a plain bool here
}

message StartCascadeResponse {
  // Echoes (or mints) the cascade id the reactive stream is keyed on.
  string cascade_id = 1;       // v1internal-fields.txt: cascade_id (field 1)
}

// StreamCascadeReactiveUpdates — server-streams step deltas for a cascade.
message StreamCascadeReactiveUpdatesRequest {
  string cascade_id = 1;       // v1internal-fields.txt: cascade_id (field 1)
  // Resume cursor: only stream steps at/after this stable index. Lets the
  // driver reconnect without re-reading the whole trajectory.
  int64 since_step_index = 2;  // PROVISIONAL
}

// One reactive update frame. Carved tags:
//   cascade_id        (bytes, 1)   — which cascade this frame belongs to
//   trajectory_steps  (rep, 1)     — the (new/updated) step list in this frame
message CascadeReactiveUpdate {
  string cascade_id = 1;                  // v1internal-fields.txt: cascade_id (field 1)
  repeated CascadeStep trajectory_steps = 2; // v1internal-fields.txt: trajectory_steps (rep 1) — moved off 1 to avoid clash with cascade_id; PROVISIONAL number
}

// CancelCascadeSteps — cancel the in-flight turn.
message CancelCascadeStepsRequest {
  string cascade_id = 1;       // v1internal-fields.txt: cascade_id (field 1)
}

message CancelCascadeStepsResponse {
  bool cancelled = 1;          // PROVISIONAL
}

// HandleCascadeUserInteraction — answer a permission/approval the agent raised.
// rpc-methods.txt lists this on LanguageServerService; it is the per-turn
// interactive-feedback channel (the SeatManagement `*Preapproval*` RPCs are
// team-admin plumbing, not the per-turn approval). The request shape below is
// PROVISIONAL — we send the cascade id + the permission id + approve/reject.
message HandleCascadeUserInteractionRequest {
  string cascade_id = 1;       // v1internal-fields.txt: cascade_id (field 1)
  string permission_id = 2;    // PROVISIONAL — the CascadePermission.permission_id we are answering
  bool approve = 3;            // PROVISIONAL — true = approve proposed steps, false = reject
}

message HandleCascadeUserInteractionResponse {
  bool handled = 1;            // PROVISIONAL
}

// ---------------------------------------------------------------------------
// Service. Method names are EXACT (from rpc-methods.txt:
// /exa.language_server_pb.LanguageServerService/{StartCascade,
//  StreamCascadeReactiveUpdates,CancelCascadeSteps,HandleCascadeUserInteraction}).
// Only the request/response message shapes are curated.
// ---------------------------------------------------------------------------
service LanguageServerService {
  // Begin a Cascade turn.
  rpc StartCascade(StartCascadeRequest) returns (StartCascadeResponse);

  // Server-stream step deltas as the turn runs.
  rpc StreamCascadeReactiveUpdates(StreamCascadeReactiveUpdatesRequest)
      returns (stream CascadeReactiveUpdate);

  // Cancel the in-flight turn.
  rpc CancelCascadeSteps(CancelCascadeStepsRequest)
      returns (CancelCascadeStepsResponse);

  // Answer a permission/approval prompt the agent raised.
  rpc HandleCascadeUserInteraction(HandleCascadeUserInteractionRequest)
      returns (HandleCascadeUserInteractionResponse);
}
