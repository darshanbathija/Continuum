<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Gemini brand mark — 4-pointed star shape. Template-mode asset for the
    menu bar (alpha-shaped fill auto-tinted by SwiftUI's foreground style).
    Designed as a clean glyph that reads at 14pt (menu bar status item) and
    on the dashboard at 32pt. Same template treatment as ClaudeLogo /
    CodexLogo (see MenuBarGaugeView.isTemplateAsset).
  -->
  <path fill="currentColor"
        d="M12 1.5
           C 12.5 6.0 14.0 7.5 18.5 8.0
           C 18.5 8.5 18.5 9.0 18.5 9.0
           C 14.0 9.5 12.5 11.0 12.0 15.5
           C 11.5 11.0 10.0 9.5 5.5 9.0
           C 5.5 8.5 5.5 8.0 5.5 8.0
           C 10.0 7.5 11.5 6.0 12 1.5 Z
           M 12 8.5
           C 12.25 10.0 12.75 10.75 14.5 11.0
           C 12.75 11.25 12.25 12.0 12 13.5
           C 11.75 12.0 11.25 11.25 9.5 11.0
           C 11.25 10.75 11.75 10.0 12 8.5 Z" />
  <!--
    Lower ray of the star for visual balance (the 4-point Gemini glyph has
    a slight vertical emphasis below the center).
  -->
  <path fill="currentColor"
        d="M 12 16
           C 12.5 19.0 14.0 20.5 18.5 21.0
           C 18.5 21.5 18.5 21.5 18.5 22.0
           C 14.0 21.5 12.5 22.5 12 22.0
           C 11.5 22.5 10.0 21.5 5.5 22.0
           C 5.5 21.5 5.5 21.5 5.5 21.0
           C 10.0 20.5 11.5 19.0 12 16 Z" opacity="0" />
</svg>
